name: News Digest

on:
  schedule:
    # Vietnam (UTC+7): 08:00, 13:00, 19:00  →  UTC: 01:00, 06:00, 12:00
    - cron: "0 1,6,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed so the job can commit the updated state file back

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Build
        run: go build -o news-digest .

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./news-digest -state state.json

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update digest state"
            git push
          else
            echo "state.json unchanged"
          fi
